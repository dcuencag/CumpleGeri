<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>¡Feliz Cumpleaños Javi! 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: #06060f;
      color: #fff;
      font-family: 'Fredoka One', cursive;
      overflow: hidden;
      height: 100svh;
      display: flex;
      flex-direction: column;
      -webkit-tap-highlight-color: transparent;
    }


    /* ── CONFETTI CANVAS ── */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ════════════════════════
       HERO
    ════════════════════════ */
    .hero {
      position: relative;
      z-index: 2;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem 1rem 0.6rem;
      text-align: center;
      gap: 0.25rem;
      overflow: hidden;
    }



    /* "Feliz Cumpleaños" */
    .hero-title {
      position: relative;
      z-index: 1;
      font-size: clamp(1.5rem, 6vw, 3.5rem);
      line-height: .95;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff6eb4 0%, #ffd700 30%, #00e5ff 55%, #bf5fff 80%, #39ff14 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradShift 3s ease infinite, heroGlow 2.2s ease-in-out infinite, fadeUp 1s ease .4s both;
    }

    /* JAVI wrapper — holds name + aura */
    .hero-name-wrap {
      position: relative;
      z-index: 1;
      display: inline-block;
    }
    /* Aura blob behind JAVI */
    .javi-aura {
      position: absolute;
      inset: -40% -20%;
      background: radial-gradient(ellipse at 50% 55%,
        rgba(255,215,0,.22) 0%,
        rgba(255,110,180,.14) 45%,
        transparent 72%);
      filter: blur(38px);
      pointer-events: none;
      animation: javiPulse 2s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes javiPulse {
      0%,100% { transform: scale(1);   opacity: .75; }
      50%     { transform: scale(1.12); opacity: 1; }
    }

    /* JAVI name */
    .hero-name {
      position: relative;
      z-index: 1;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.8rem, 13vw, 7rem);
      line-height: .88;
      background: linear-gradient(160deg, #ffe566 0%, #ffb347 28%, #ff6eb4 58%, #c084fc 85%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradShift 2s ease infinite, nameGlow 1.5s ease-in-out infinite, fadeUp 1s ease .6s both;
    }

    /* Keyframes */
    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes heroGlow {
      0%,100% { filter: drop-shadow(0 0 18px rgba(255,110,180,.45)) drop-shadow(0 0 45px rgba(0,229,255,.18)); }
      50%     { filter: drop-shadow(0 0 38px rgba(255,110,180,.85)) drop-shadow(0 0 75px rgba(0,229,255,.45)); }
    }
    @keyframes nameGlow {
      0%,100% { filter: drop-shadow(0 0 28px rgba(255,215,0,.55)); }
      50%     { filter: drop-shadow(0 0 55px rgba(255,215,0,1)) drop-shadow(0 0 90px rgba(255,110,180,.5)); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(26px); }
      to   { opacity: 1; transform: translateY(0); }
    }


    /* ════════════════════════
       SCATTER SCENE
    ════════════════════════ */
    body { overflow: hidden; height: 100svh; }

    #photo-grid {
      position: relative;
      z-index: 2;
      flex: 1 1 0;
      min-height: 0;
      width: 100%;
    }

    .photo-card {
      position: absolute;
      background: #f8f3ea;
      padding: 10px 10px 38px;
      width: var(--card-w);
      box-shadow:
        0 18px 55px rgba(0,0,0,.82),
        0 4px 14px rgba(0,0,0,.5);
      cursor: pointer;
      transform-origin: center center;
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot));
      transition: transform .18s ease, box-shadow .18s ease, z-index 0s;
      will-change: transform;
    }
    .photo-card:hover {
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1.08);
      box-shadow: 0 28px 80px rgba(0,0,0,.92), 0 0 30px rgba(255,215,0,.25);
      z-index: 50 !important;
    }
    .photo-card img {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      pointer-events: none;
    }
    .photo-card .caption {
      font-family: 'Comic Sans MS', cursive;
      font-size: clamp(.62rem, 2.2vw, .76rem);
      color: #2a1a0a;
      text-align: center;
      margin-top: 7px;
      line-height: 1.3;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 100%;
      max-height: 90svh;
      object-fit: contain;
      box-shadow: 0 0 60px rgba(0,0,0,.9);
    }
    #lightbox-close {
      position: fixed;
      top: 16px;
      right: 20px;
      font-size: 2.4rem;
      color: #fff;
      cursor: pointer;
      line-height: 1;
      opacity: .8;
    }
    #lightbox-close:hover { opacity: 1; }

  </style>
</head>
<body>

<canvas id="confetti"></canvas>

<!-- ═══ HERO ═══ -->
<section class="hero">
  <h1 class="hero-title">¡Feliz<br>Cumpleaños!</h1>
  <div class="hero-name-wrap">
    <div class="javi-aura"></div>
    <div class="hero-name">Javi</div>
  </div>
</section>

<!-- ═══ PHOTOS ═══ -->
<div id="photo-grid"></div>

<!-- Lightbox -->
<div id="lightbox">
  <span id="lightbox-close">&#x2715;</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
/* ═══════════════════════════════════════
   CONFETTI
═══════════════════════════════════════ */
(function () {
  const cv = document.getElementById('confetti');
  const cx = cv.getContext('2d');
  const COLS = ['#ff6eb4','#ffd700','#00e5ff','#bf5fff','#39ff14',
                '#ff6b35','#ff4455','#55ff88','#55aaff','#ffaa00'];
  let W, H, pts = [];
  function resize() { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  function mk(fromTop) {
    return {
      x: Math.random() * W, y: fromTop ? -12 : Math.random() * H,
      w: Math.random() * 9 + 5, h: Math.random() * 5 + 3,
      c: COLS[Math.random() * COLS.length | 0],
      vx: (Math.random() - .5) * 2.5, vy: Math.random() * 2.5 + 1.5,
      rot: Math.random() * 360, rv: (Math.random() - .5) * 7,
      wob: Math.random() * Math.PI * 2, wobS: Math.random() * .04 + .02,
      sh: Math.random() * 3 | 0, a: 1
    };
  }
  for (let i = 0; i < 120; i++) pts.push(mk(false));
  let f = 0;
  (function tick() {
    cx.clearRect(0, 0, W, H);
    if (++f % 3 === 0 && pts.length < 200) pts.push(mk(true));
    pts = pts.filter(p => {
      p.wob += p.wobS; p.x += p.vx + Math.sin(p.wob) * 1.2;
      p.y += p.vy; p.vy += .04; p.rot += p.rv;
      if (p.y > H * .78) p.a = Math.max(0, p.a - .018);
      return p.y < H + 20 && p.a > 0;
    });
    pts.forEach(p => {
      cx.save(); cx.globalAlpha = p.a;
      cx.translate(p.x, p.y); cx.rotate(p.rot * Math.PI / 180);
      cx.fillStyle = p.c;
      if (p.sh === 0) { cx.fillRect(-p.w/2, -p.h/2, p.w, p.h); }
      else if (p.sh === 1) { cx.beginPath(); cx.arc(0,0,p.w/2,0,Math.PI*2); cx.fill(); }
      else { cx.beginPath(); cx.moveTo(0,-p.w/2); cx.lineTo(p.w/2,0); cx.lineTo(0,p.w/2); cx.lineTo(-p.w/2,0); cx.closePath(); cx.fill(); }
      cx.restore();
    });
    requestAnimationFrame(tick);
  })();
})();

  const NAMES = [
    '333762199-288-k582744.jpg',
    '4d0523f71c7d18c87d981598e1ad110b.jpg',
    'bob.jpeg',
    'gato.jpeg',
    'Gay-Unicorn-thumbnail-url-8b56j.jpg',
    'images.jpeg',
    'mo,small,flatlay,product_square,600x600.jpg'
  ];
  const CAPTIONS = [
    '🎂 feliz 24 javi',
    '🌈 iconic',
    '🦕 bob es bob',
    '🐱 el verdadero jefe',
    '🦄 arte',
    '✨ clásico',
    '🎉 24 años y contando'
  ];

  const grid = document.getElementById('photo-grid');
  const lb   = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');

  // Positions: [left%, top%, rotate_deg, z-index]
  const POSES = [
    [3,   3,  -9, 4],
    [52,  2,   6, 3],
    [1,  40,  -4, 5],
    [30, 28,   8, 2],
    [57, 34,  -7, 6],
    [13, 65,   5, 1],
    [48, 62,  -5, 7],
  ];

  const W = grid.offsetWidth || window.innerWidth;
  const H = grid.offsetHeight || window.innerHeight * 0.65;
  const cardW = Math.min(160, W * 0.36);

  grid.style.setProperty('--card-w', cardW + 'px');

  NAMES.forEach((name, i) => {
    const src  = IMAGES[name] || name;
    const [lp, tp, rot, zi] = POSES[i % POSES.length];
    const tx = (lp / 100) * W;
    const ty = (tp / 100) * H;

    const card = document.createElement('div');
    card.className = 'photo-card';
    card.style.cssText = `--tx:${tx}px;--ty:${ty}px;--rot:${rot}deg;--card-w:${cardW}px;left:0;top:0;z-index:${zi};`;
    const img = document.createElement('img');
    img.src = src; img.alt = name;
    const cap = document.createElement('p');
    cap.className = 'caption'; cap.textContent = CAPTIONS[i] || '';
    card.appendChild(img); card.appendChild(cap);
    card.addEventListener('click', () => { lbImg.src = src; lb.classList.add('open'); });
    grid.appendChild(card);
  });

  document.getElementById('lightbox-close').addEventListener('click', () => lb.classList.remove('open'));
  lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });
})();
</script>
